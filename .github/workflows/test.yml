name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.22"

      - name: Set up Python
        run: uv python install 3.11

      - name: Create venv
        run: uv venv

      - name: Install dependencies
        run: uv pip install -r requirements.txt pytest

      - name: Run tests
        run: uv run pytest -q